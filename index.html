<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>CYBERBLOCK // CAM HUD</title>
  <style>
    :root{
      --neon:#00ff66;
      --neon2:#00c853;
      --bg:#030608;
      --danger:#ff2a6d;
      --ink: rgba(0,255,102,.12);
      --ink2: rgba(0,255,102,.25);
      --glass: rgba(0,0,0,.45);
      --glass2: rgba(0,0,0,.62);
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; margin:0; background:var(--bg); color:#d7ffe6; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; overflow:hidden; }

    /* Camera background */
    #wrap{
      position:fixed; inset:0; background:#000;
    }
    video{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit: cover;
      transform: scaleX(-1); /* selfie mirror */
      filter: contrast(1.08) saturate(1.05) brightness(0.98);
      background:#000;
    }

    /* Overlay canvases */
    canvas{
      position:absolute; inset:0;
      width:100%; height:100%;
      image-rendering: pixelated;
      pointer-events:none;
    }

    /* HUD */
    #hud{
      position:absolute; inset:0;
      pointer-events:none;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,.15) 55%, rgba(0,0,0,.35) 100%),
        repeating-linear-gradient(to bottom, rgba(0,255,102,.08), rgba(0,255,102,.08) 1px, rgba(0,0,0,0) 3px, rgba(0,0,0,0) 7px);
      mix-blend-mode: screen;
      opacity:.55;
    }

    /* Control panel */
    #panel{
      position:absolute;
      left:10px; right:10px; top:10px;
      display:flex; gap:8px; align-items:stretch;
      pointer-events:auto;
    }
    .card{
      flex:1;
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border: 1px solid rgba(0,255,102,.18);
      box-shadow: 0 8px 30px rgba(0,0,0,.45);
      border-radius: 12px;
      padding:10px 10px;
      min-width: 130px;
      backdrop-filter: blur(6px);
    }
    .row{ display:flex; gap:8px; align-items:center; justify-content:space-between; }
    .title{
      font-weight:700; letter-spacing:.14em; font-size:12px; color:rgba(0,255,102,.9);
      text-transform:uppercase;
    }
    .small{ font-size:12px; opacity:.9; }
    button, select, input[type="range"]{
      pointer-events:auto;
    }
    button{
      width:100%;
      border-radius: 10px;
      border:1px solid rgba(0,255,102,.35);
      background: radial-gradient(120% 120% at 50% 0%, rgba(0,255,102,.22) 0%, rgba(0,0,0,.35) 55%, rgba(0,0,0,.55) 100%);
      color: #dfffea;
      padding:10px 12px;
      font-weight:700;
      letter-spacing:.10em;
      text-transform: uppercase;
      cursor:pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.35);
    }
    button:active{ transform: translateY(1px); }
    button.danger{
      border-color: rgba(255,42,109,.45);
      background: radial-gradient(120% 120% at 50% 0%, rgba(255,42,109,.22) 0%, rgba(0,0,0,.35) 55%, rgba(0,0,0,.55) 100%);
    }
    select{
      width:100%;
      border-radius:10px;
      border:1px solid rgba(0,255,102,.25);
      background: rgba(0,0,0,.4);
      color:#dfffea;
      padding:10px 10px;
      outline:none;
    }
    .meter{
      font-variant-numeric: tabular-nums;
      font-size:12px;
      opacity:.95;
    }

    /* Bottom help */
    #help{
      position:absolute; left:10px; right:10px; bottom:10px;
      pointer-events:none;
      background: linear-gradient(180deg, rgba(0,0,0,.0), rgba(0,0,0,.55));
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(0,255,102,.14);
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
    }
    #help .k{ color: rgba(0,255,102,.95); font-weight:700; }
    #help .d{ opacity:.92; font-size:12px; line-height:1.25rem; }

    /* Fullscreen touch layer */
    #touch{
      position:absolute; inset:0;
      touch-action: none; /* we handle panning/zooming */
      pointer-events:auto;
      background: transparent;
    }

    /* Status banner */
    #status{
      position:absolute; right:12px; top:74px;
      pointer-events:none;
      padding:8px 10px;
      background: rgba(0,0,0,.55);
      border:1px solid rgba(0,255,102,.18);
      border-radius: 10px;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(0,255,102,.9);
      max-width: 62vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #status.bad{ color: rgba(255,42,109,.95); border-color: rgba(255,42,109,.25); }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="vid" playsinline muted></video>
    <canvas id="world"></canvas>
    <canvas id="fx"></canvas>
    <div id="hud"></div>
    <div id="touch" aria-label="Touch layer"></div>

    <div id="panel">
      <div class="card" style="flex:1.2">
        <div class="row" style="margin-bottom:8px">
          <div class="title">CYBERBLOCK</div>
          <div class="meter" id="fps">FPS: --</div>
        </div>
        <button id="startBtn">START CAMERA</button>
        <div style="height:8px"></div>
        <button id="fsBtn">FULLSCREEN</button>
      </div>

      <div class="card">
        <div class="title" style="margin-bottom:8px">MODE</div>
        <select id="modeSel">
          <option value="place">PLACE / PAVE</option>
          <option value="break">BREAK</option>
          <option value="move">MOVE WORLD</option>
        </select>
        <div style="height:10px"></div>
        <div class="row">
          <div class="small">Zoom</div>
          <div class="meter" id="zoomLabel">1.00x</div>
        </div>
        <input id="zoomRange" type="range" min="0.6" max="2.0" step="0.01" value="1.0" style="width:100%">
      </div>

      <div class="card">
        <div class="title" style="margin-bottom:8px">PERF</div>
        <div class="row">
          <div class="small">Quality</div>
          <select id="qSel" style="width: 56%">
            <option value="1">HIGH</option>
            <option value="0.85" selected>MED</option>
            <option value="0.7">LOW</option>
            <option value="0.55">ULTRA LOW</option>
          </select>
        </div>
        <div style="height:8px"></div>
        <button class="danger" id="clearBtn">CLEAR WORLD</button>
      </div>
    </div>

    <div id="status">READY // tap START CAMERA</div>

    <div id="help">
      <div class="d">
        <span class="k">Tap</span> place • <span class="k">Drag</span> pave • <span class="k">Double‑tap</span> break •
        <span class="k">Long‑press</span> FIST SMASH • <span class="k">Two‑finger</span> move • <span class="k">Pinch</span> zoom
      </div>
    </div>
  </div>

<script>
(() => {
  const vid = document.getElementById('vid');
  const cWorld = document.getElementById('world');
  const cFx = document.getElementById('fx');
  const ctx = cWorld.getContext('2d', { alpha:true, desynchronized:true });
  const fx = cFx.getContext('2d', { alpha:true, desynchronized:true });

  const startBtn = document.getElementById('startBtn');
  const fsBtn = document.getElementById('fsBtn');
  const clearBtn = document.getElementById('clearBtn');
  const fpsEl = document.getElementById('fps');
  const statusEl = document.getElementById('status');
  const touch = document.getElementById('touch');
  const modeSel = document.getElementById('modeSel');
  const zoomRange = document.getElementById('zoomRange');
  const zoomLabel = document.getElementById('zoomLabel');
  const qSel = document.getElementById('qSel');

  // --- World data (sparse map: "x,y" -> type)
  const blocks = new Map();
  const tileSizeBase = 38; // screen pixels at zoom=1 (world grid spacing)
  let zoom = 1.0;
  let quality = 0.85; // render scale
  let camOn = false;

  // Pan offset in screen pixels (world origin shift)
  let panX = 0, panY = 0;

  // Input tracking
  let pointers = new Map();
  let lastTapTime = 0;
  let longPressTimer = null;
  let longPressArmed = false;
  let lastPaintCell = null;

  // For pinch
  let pinchStartDist = 0;
  let pinchStartZoom = 1.0;

  // For FPS
  let tPrev = performance.now();
  let fpsSm = 60;

  function setStatus(msg, bad=false){
    statusEl.textContent = msg;
    statusEl.classList.toggle('bad', !!bad);
  }

  function resizeCanvases(){
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1)); // clamp for perf
    const w = Math.floor(innerWidth * quality * dpr);
    const h = Math.floor(innerHeight * quality * dpr);
    cWorld.width = w; cWorld.height = h;
    cFx.width = w; cFx.height = h;
    // Keep CSS full-size; drawing uses scaled coords
    ctx.setTransform(1,0,0,1,0,0);
    fx.setTransform(1,0,0,1,0,0);
  }

  function screenToWorldCell(sx, sy){
    // Convert from CSS pixels to canvas pixels then to grid
    const rect = cWorld.getBoundingClientRect();
    const cx = (sx - rect.left) * (cWorld.width / rect.width);
    const cy = (sy - rect.top) * (cWorld.height / rect.height);

    const tile = tileSizeBase * zoom * (cWorld.width / rect.width); // approximate scale
    const gx = Math.floor((cx - panX) / tile);
    const gy = Math.floor((cy - panY) / tile);
    return { gx, gy, cx, cy, tile };
  }

  function keyOf(gx, gy){ return gx + "," + gy; }

  function placeBlock(gx, gy, type=1){
    blocks.set(keyOf(gx,gy), type);
  }
  function breakBlock(gx, gy){
    blocks.delete(keyOf(gx,gy));
  }

  function smash(gx, gy, r=1){
    for(let y=-r; y<=r; y++){
      for(let x=-r; x<=r; x++){
        if (x*x + y*y <= r*r) blocks.delete(keyOf(gx+x, gy+y));
      }
    }
    // punch flash
    flash(gx, gy, 1.8, 'smash');
  }

  // Lightweight FX
  const flashes = [];
  function flash(gx, gy, strength=1, kind='hit'){
    flashes.push({ gx, gy, strength, kind, t: performance.now() });
    if (flashes.length > 10) flashes.shift();
  }

  // Draw stylized cyber skeleton + green hand cursor
  function drawHUDHandAndSkeleton(pointer){
    const w = cFx.width, h = cFx.height;
    fx.clearRect(0,0,w,h);

    // vignette + corners
    fx.save();
    fx.globalAlpha = 0.9;
    fx.strokeStyle = 'rgba(0,255,102,.18)';
    fx.lineWidth = Math.max(1, Math.floor(w*0.0012));
    const pad = Math.floor(Math.min(w,h)*0.045);
    const corner = Math.floor(pad*0.7);
    // corners
    function cornerStroke(x,y,dx,dy){
      fx.beginPath();
      fx.moveTo(x, y+dy*corner);
      fx.lineTo(x, y);
      fx.lineTo(x+dx*corner, y);
      fx.stroke();
    }
    cornerStroke(pad,pad, 1,1);
    cornerStroke(w-pad,pad, -1,1);
    cornerStroke(pad,h-pad, 1,-1);
    cornerStroke(w-pad,h-pad, -1,-1);

    // center reticle
    fx.globalAlpha = 0.7;
    fx.beginPath();
    fx.arc(w/2, h/2, Math.min(w,h)*0.045, 0, Math.PI*2);
    fx.stroke();
    fx.beginPath();
    fx.moveTo(w/2 - 30, h/2); fx.lineTo(w/2 + 30, h/2);
    fx.moveTo(w/2, h/2 - 30); fx.lineTo(w/2, h/2 + 30);
    fx.stroke();

    // "Skeleton" stick figure HUD (purely visual)
    fx.globalAlpha = 0.55;
    fx.strokeStyle = 'rgba(0,255,102,.25)';
    fx.lineWidth = Math.max(1, Math.floor(w*0.0011));
    const sx = w*0.12, sy = h*0.72;
    const scale = Math.min(w,h)*0.20;
    // head
    fx.beginPath(); fx.arc(sx, sy - scale*0.75, scale*0.14, 0, Math.PI*2); fx.stroke();
    // spine
    fx.beginPath();
    fx.moveTo(sx, sy - scale*0.62);
    fx.lineTo(sx, sy - scale*0.18);
    fx.stroke();
    // arms
    fx.beginPath();
    fx.moveTo(sx - scale*0.22, sy - scale*0.48);
    fx.lineTo(sx + scale*0.22, sy - scale*0.48);
    fx.stroke();
    // ribs
    for(let i=0;i<4;i++){
      const yy = (sy - scale*0.56) + i*(scale*0.08);
      fx.beginPath();
      fx.moveTo(sx - scale*0.16, yy);
      fx.lineTo(sx + scale*0.16, yy);
      fx.stroke();
    }
    // pelvis + legs
    fx.beginPath();
    fx.moveTo(sx - scale*0.12, sy - scale*0.18);
    fx.lineTo(sx + scale*0.12, sy - scale*0.18);
    fx.stroke();
    fx.beginPath();
    fx.moveTo(sx, sy - scale*0.18);
    fx.lineTo(sx - scale*0.14, sy + scale*0.14);
    fx.moveTo(sx, sy - scale*0.18);
    fx.lineTo(sx + scale*0.14, sy + scale*0.14);
    fx.stroke();

    // Green "cyber hand" cursor (stylized glove)
    if (pointer){
      const x = pointer.cx, y = pointer.cy;
      fx.globalAlpha = 0.9;
      // glow
      fx.shadowColor = 'rgba(0,255,102,.55)';
      fx.shadowBlur = 18;
      fx.fillStyle = 'rgba(0,255,102,.16)';
      fx.beginPath(); fx.arc(x, y, 22, 0, Math.PI*2); fx.fill();
      fx.shadowBlur = 0;

      // hand shape (simple)
      fx.strokeStyle = 'rgba(0,255,102,.88)';
      fx.lineWidth = 2;
      fx.beginPath();
      // palm
      fx.moveTo(x-10, y+8);
      fx.lineTo(x-12, y-2);
      fx.quadraticCurveTo(x-12,y-14,x-2,y-14);
      fx.quadraticCurveTo(x+10,y-14,x+10,y-2);
      fx.lineTo(x+8, y+10);
      fx.quadraticCurveTo(x+2,y+16,x-6,y+12);
      fx.closePath();
      fx.stroke();

      // fingers
      fx.beginPath();
      fx.moveTo(x-6, y-14); fx.lineTo(x-8, y-24);
      fx.moveTo(x-1, y-14); fx.lineTo(x-1, y-26);
      fx.moveTo(x+4, y-14); fx.lineTo(x+6, y-24);
      fx.stroke();

      // data lines
      fx.globalAlpha = 0.55;
      fx.strokeStyle = 'rgba(0,255,102,.42)';
      fx.beginPath();
      fx.moveTo(x+18,y); fx.lineTo(x+58,y);
      fx.moveTo(x+18,y+8); fx.lineTo(x+46,y+8);
      fx.stroke();
    }

    fx.restore();

    // FX flashes over grid cells
    const now = performance.now();
    const rect = cWorld.getBoundingClientRect();
    const scaleX = cWorld.width / rect.width;
    const scaleY = cWorld.height / rect.height;
    const tileCss = tileSizeBase * zoom;
    const tile = tileCss * scaleX;

    for (const f of flashes){
      const age = (now - f.t) / 260;
      if (age > 1.2) continue;
      const alpha = (1 - age) * 0.9;
      const px = panX + f.gx*tile + tile*0.5;
      const py = panY + f.gy*tile + tile*0.5;

      fx.save();
      fx.globalAlpha = alpha;
      fx.strokeStyle = f.kind === 'smash' ? 'rgba(255,42,109,.85)' : 'rgba(0,255,102,.85)';
      fx.lineWidth = 2;
      fx.beginPath();
      fx.arc(px, py, tile*0.55*(0.6+age), 0, Math.PI*2);
      fx.stroke();
      fx.restore();
    }
  }

  function drawWorld(pointer){
    const w = cWorld.width, h = cWorld.height;
    ctx.clearRect(0,0,w,h);

    const rect = cWorld.getBoundingClientRect();
    const scaleX = w / rect.width;
    const tileCss = tileSizeBase * zoom;
    const tile = tileCss * scaleX;

    // Visible range (cull)
    const gx0 = Math.floor((-panX) / tile) - 2;
    const gy0 = Math.floor((-panY) / tile) - 2;
    const gx1 = Math.floor((w - panX) / tile) + 2;
    const gy1 = Math.floor((h - panY) / tile) + 2;

    // Grid
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = 'rgba(0,255,102,.12)';
    ctx.lineWidth = 1;
    for(let gx = gx0; gx <= gx1; gx++){
      const x = Math.floor(panX + gx*tile) + 0.5;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for(let gy = gy0; gy <= gy1; gy++){
      const y = Math.floor(panY + gy*tile) + 0.5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    ctx.restore();

    // Blocks (only visible)
    // Simple shading for 3D-ish look without WebGL
    for(let gy = gy0; gy <= gy1; gy++){
      for(let gx = gx0; gx <= gx1; gx++){
        const k = keyOf(gx,gy);
        if (!blocks.has(k)) continue;
        const x = panX + gx*tile;
        const y = panY + gy*tile;

        // block fill
        ctx.save();
        ctx.globalAlpha = 0.92;
        ctx.fillStyle = 'rgba(0,255,102,.16)';
        ctx.fillRect(x+1, y+1, tile-2, tile-2);

        // inner detail
        ctx.globalAlpha = 0.95;
        ctx.strokeStyle = 'rgba(0,255,102,.55)';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+2, y+2, tile-4, tile-4);

        // "circuit" lines
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = 'rgba(0,255,102,.32)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + tile*0.18, y + tile*0.5);
        ctx.lineTo(x + tile*0.82, y + tile*0.5);
        ctx.moveTo(x + tile*0.5, y + tile*0.18);
        ctx.lineTo(x + tile*0.5, y + tile*0.82);
        ctx.stroke();

        ctx.restore();
      }
    }

    // Highlight targeted cell
    if (pointer){
      const x = panX + pointer.gx*tile;
      const y = panY + pointer.gy*tile;
      ctx.save();
      ctx.globalAlpha = 0.95;
      ctx.strokeStyle = pointer.mode === 'break' ? 'rgba(255,42,109,.95)' : 'rgba(0,255,102,.95)';
      ctx.lineWidth = 3;
      ctx.strokeRect(x+1.5, y+1.5, tile-3, tile-3);
      ctx.restore();
    }

    // Subtle scanline-ish overlay on world canvas for hacker vibe
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = 'rgba(0,255,102,.08)';
    for(let y=0; y<h; y+=6){
      ctx.fillRect(0, y, w, 1);
    }
    ctx.restore();
  }

  function updateFPS(now){
    const dt = now - tPrev; tPrev = now;
    const fps = 1000 / Math.max(1, dt);
    fpsSm = fpsSm*0.9 + fps*0.1;
    fpsEl.textContent = "FPS: " + fpsSm.toFixed(0);
  }

  function render(now){
    updateFPS(now);

    // Use primary pointer (if any) for targeting
    let primary = null;
    for (const p of pointers.values()){ primary = p; break; }

    drawWorld(primary);
    drawHUDHandAndSkeleton(primary);

    requestAnimationFrame(render);
  }

  // --- Camera
  async function startCamera(){
    if (!navigator.mediaDevices?.getUserMedia){
      setStatus("Camera API not available", true);
      return;
    }
    try{
      setStatus("Requesting camera permission…");
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 640 },
          height:{ ideal: 480 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });
      vid.srcObject = stream;
      await vid.play();
      camOn = true;
      setStatus("CAM ONLINE // BLOCK OPS READY");
      startBtn.textContent = "CAMERA RUNNING";
      startBtn.disabled = true;
    }catch(err){
      setStatus("Camera blocked or unavailable", true);
      console.error(err);
    }
  }

  // --- Interactions
  function armLongPress(p){
    disarmLongPress();
    longPressArmed = true;
    longPressTimer = setTimeout(() => {
      if (!longPressArmed) return;
      // fist smash at pointer cell
      const { gx, gy } = p;
      smash(gx, gy, 1);
      setStatus("FIST SMASH // BREAK RADIUS");
      // prevent paint continuation
      lastPaintCell = null;
    }, 220);
  }
  function disarmLongPress(){
    longPressArmed = false;
    if (longPressTimer){ clearTimeout(longPressTimer); longPressTimer = null; }
  }

  function handleActionAt(p, action){
    const mode = modeSel.value;
    p.mode = mode;

    if (mode === 'move'){
      return; // handled by gesture panning
    }

    if (action === 'place'){
      placeBlock(p.gx, p.gy, 1);
      flash(p.gx, p.gy, 1, 'place');
      setStatus("PLACE // tap/drag to pave");
    } else if (action === 'break'){
      breakBlock(p.gx, p.gy);
      flash(p.gx, p.gy, 1, 'hit');
      setStatus("BREAK // double-tap or long-press");
    }
  }

  function onPointerDown(e){
    e.preventDefault();
    touch.setPointerCapture(e.pointerId);

    const cell = screenToWorldCell(e.clientX, e.clientY);
    const p = {
      id: e.pointerId,
      x: e.clientX, y: e.clientY,
      cx: cell.cx, cy: cell.cy,
      gx: cell.gx, gy: cell.gy,
      startX: e.clientX, startY: e.clientY,
      lastX: e.clientX, lastY: e.clientY,
      downT: performance.now(),
      mode: modeSel.value,
    };
    pointers.set(e.pointerId, p);

    // If two pointers: setup pinch
    if (pointers.size === 2){
      disarmLongPress();
      const ps = Array.from(pointers.values());
      pinchStartDist = Math.hypot(ps[0].x - ps[1].x, ps[0].y - ps[1].y);
      pinchStartZoom = zoom;
      return;
    }

    // Single pointer: long-press "fist"
    armLongPress(p);

    // Tap action (place) will happen on up unless drag painting triggers
    lastPaintCell = null;
  }

  function onPointerMove(e){
    if (!pointers.has(e.pointerId)) return;
    e.preventDefault();

    const p = pointers.get(e.pointerId);
    p.lastX = p.x; p.lastY = p.y;
    p.x = e.clientX; p.y = e.clientY;

    const cell = screenToWorldCell(e.clientX, e.clientY);
    p.cx = cell.cx; p.cy = cell.cy;
    p.gx = cell.gx; p.gy = cell.gy;

    // Two-finger gestures: pan + pinch zoom
    if (pointers.size === 2){
      disarmLongPress();
      const ps = Array.from(pointers.values());
      const dx = (ps[0].x - ps[0].lastX + ps[1].x - ps[1].lastX) * 0.5;
      const dy = (ps[0].y - ps[0].lastY + ps[1].y - ps[1].lastY) * 0.5;

      // pan in canvas pixels
      const rect = cWorld.getBoundingClientRect();
      const scaleX = cWorld.width / rect.width;
      panX += dx * scaleX;
      panY += dy * scaleX;

      const dist = Math.hypot(ps[0].x - ps[1].x, ps[0].y - ps[1].y);
      const ratio = dist / Math.max(1, pinchStartDist);
      zoom = clamp(pinchStartZoom * ratio, 0.6, 2.0);
      zoomRange.value = zoom.toFixed(2);
      zoomLabel.textContent = zoom.toFixed(2) + "x";
      return;
    }

    // Single pointer: if moving enough, it's a drag => pave/place continuously
    const moved = Math.hypot(p.x - p.startX, p.y - p.startY);
    if (moved > 6){
      disarmLongPress();
      const mode = modeSel.value;
      if (mode === 'move'){
        // pan
        const rect = cWorld.getBoundingClientRect();
        const scaleX = cWorld.width / rect.width;
        panX += (p.x - p.lastX) * scaleX;
        panY += (p.y - p.lastY) * scaleX;
        setStatus("MOVE WORLD // drag");
      } else if (mode === 'place'){
        // pave (paint blocks)
        const k = keyOf(p.gx, p.gy);
        if (lastPaintCell !== k){
          placeBlock(p.gx, p.gy, 1);
          flash(p.gx, p.gy, 0.8, 'place');
          lastPaintCell = k;
          setStatus("PAVING // drag to lay blocks");
        }
      } else if (mode === 'break'){
        // optional: drag break (but keep it light)
        const k = keyOf(p.gx, p.gy);
        if (lastPaintCell !== k){
          breakBlock(p.gx, p.gy);
          flash(p.gx, p.gy, 0.7, 'hit');
          lastPaintCell = k;
          setStatus("BREAK SWEEP // drag");
        }
      }
    }
  }

  function onPointerUp(e){
    if (!pointers.has(e.pointerId)) return;
    e.preventDefault();

    const p = pointers.get(e.pointerId);
    pointers.delete(e.pointerId);

    // if one pointer remains, reset pinch baseline
    if (pointers.size < 2){
      pinchStartDist = 0;
    }

    const dt = performance.now() - p.downT;
    const moved = Math.hypot(p.x - p.startX, p.y - p.startY);

    // If it was a simple tap (no significant move), decide tap/double-tap
    if (moved <= 6 && dt < 260){
      disarmLongPress();
      const now = performance.now();
      const isDouble = (now - lastTapTime) < 300;
      lastTapTime = now;

      if (isDouble){
        // double-tap => break
        breakBlock(p.gx, p.gy);
        flash(p.gx, p.gy, 1.2, 'hit');
        setStatus("DOUBLE TAP // BREAK");
      }else{
        // single tap depends on mode
        const mode = modeSel.value;
        if (mode === 'break'){
          breakBlock(p.gx, p.gy);
          flash(p.gx, p.gy, 1.0, 'hit');
          setStatus("BREAK // tap");
        } else if (mode === 'move'){
          setStatus("MOVE WORLD // use drag");
        } else {
          placeBlock(p.gx, p.gy, 1);
          flash(p.gx, p.gy, 1.0, 'place');
          setStatus("PLACE // tap");
        }
      }
    } else {
      disarmLongPress();
    }
    lastPaintCell = null;
  }

  function onPointerCancel(e){
    if (!pointers.has(e.pointerId)) return;
    pointers.delete(e.pointerId);
    disarmLongPress();
    lastPaintCell = null;
  }

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  // --- UI events
  startBtn.addEventListener('click', startCamera);

  fsBtn.addEventListener('click', async () => {
    try{
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    }catch(e){}
  });

  clearBtn.addEventListener('click', () => {
    blocks.clear();
    setStatus("WORLD CLEARED");
  });

  zoomRange.addEventListener('input', () => {
    zoom = parseFloat(zoomRange.value);
    zoomLabel.textContent = zoom.toFixed(2) + "x";
  });

  qSel.addEventListener('change', () => {
    quality = parseFloat(qSel.value);
    resizeCanvases();
    setStatus("PERF SET // quality " + qSel.options[qSel.selectedIndex].text);
  });

  modeSel.addEventListener('change', () => {
    setStatus("MODE // " + modeSel.options[modeSel.selectedIndex].text);
  });

  // Pointer events
  touch.addEventListener('pointerdown', onPointerDown, { passive:false });
  touch.addEventListener('pointermove', onPointerMove, { passive:false });
  touch.addEventListener('pointerup', onPointerUp, { passive:false });
  touch.addEventListener('pointercancel', onPointerCancel, { passive:false });

  // Init
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  // Seed a small “platform” so you see something immediately
  for(let y=6;y<11;y++){
    for(let x=5;x<15;x++){
      blocks.set(keyOf(x,y),1);
    }
  }
  setStatus("READY // tap START CAMERA");
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
