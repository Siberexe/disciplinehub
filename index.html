<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>DUAL CAM // SPLIT HUD</title>
<style>
  :root{ --g:#00ff66; --bg:#05080a; --glass:rgba(0,0,0,.55); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; background:var(--bg); color:#dfffe9; font-family:system-ui,Segoe UI,Roboto,Arial; overflow:hidden; }
  #topbar{
    position:fixed; left:10px; right:10px; top:10px; z-index:5;
    display:flex; gap:10px; align-items:stretch;
  }
  .card{
    flex:1; padding:10px 12px; border-radius:12px;
    background:linear-gradient(180deg, rgba(0,0,0,.35), var(--glass));
    border:1px solid rgba(0,255,102,.18);
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 25px rgba(0,0,0,.35);
  }
  .title{ font-weight:800; letter-spacing:.14em; font-size:12px; color:rgba(0,255,102,.92); text-transform:uppercase; }
  button, select{
    width:100%; margin-top:8px; padding:10px 12px; border-radius:10px;
    border:1px solid rgba(0,255,102,.35); background:rgba(0,0,0,.45);
    color:#dfffe9; font-weight:800; letter-spacing:.10em; text-transform:uppercase;
  }
  button:active{ transform:translateY(1px); }

  #grid{
    position:fixed; inset:0; display:grid; grid-template-columns:1fr 1fr; gap:2px;
    padding:70px 2px 2px 2px;
  }
  .pane{ position:relative; background:#000; overflow:hidden; }
  video, canvas{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  video{ transform:scaleX(-1); } /* mirror feels more “controller-like” */
  .hud{
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(to bottom, rgba(0,255,102,.10), rgba(0,255,102,.10) 1px, rgba(0,0,0,0) 3px, rgba(0,0,0,0) 8px);
    mix-blend-mode:screen; opacity:.45; pointer-events:none;
  }
  .label{
    position:absolute; left:10px; bottom:10px; z-index:3;
    padding:7px 10px; border-radius:10px;
    background:rgba(0,0,0,.55); border:1px solid rgba(0,255,102,.18);
    font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:rgba(0,255,102,.92);
  }
</style>
</head>
<body>
  <div id="topbar">
    <div class="card">
      <div class="title">Dual Cam (switch)</div>
      <button id="start">Start Camera</button>
      <button id="flip">Flip Front/Back</button>
    </div>
    <div class="card">
      <div class="title">Performance</div>
      <select id="res">
        <option value="320x240">Ultra Low (320×240)</option>
        <option value="424x240" selected>Low (424×240)</option>
        <option value="640x480">Medium (640×480)</option>
      </select>
      <div style="margin-top:8px;font-size:12px;opacity:.9;line-height:1.25rem">
        True dual-cam in browser is often blocked; this file safely switches. <span style="color:rgba(0,255,102,.9)">No lag focus.</span>
      </div>
    </div>
  </div>

  <div id="grid">
    <div class="pane">
      <video id="v1" playsinline muted></video>
      <div class="hud"></div>
      <div class="label" id="l1">LEFT // RAW</div>
    </div>
    <div class="pane">
      <canvas id="c2"></canvas>
      <div class="hud"></div>
      <div class="label" id="l2">RIGHT // GREEN EDGE</div>
    </div>
  </div>

<script>
(() => {
  const v1 = document.getElementById('v1');
  const c2 = document.getElementById('c2');
  const x2 = c2.getContext('2d', { alpha:false, desynchronized:true });
  const startBtn = document.getElementById('start');
  const flipBtn  = document.getElementById('flip');
  const resSel   = document.getElementById('res');

  let stream = null;
  let facing = 'environment'; // start back cam
  let lastT = 0;

  function stopStream(){
    if (!stream) return;
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  async function startCamera(){
    stopStream();
    const [w,h] = resSel.value.split('x').map(n=>+n);
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: facing },
          width: { ideal: w }, height: { ideal: h },
          frameRate: { ideal: 24, max: 30 }
        },
        audio:false
      });
      v1.srcObject = stream;
      await v1.play();
      startBtn.textContent = "Camera Running";
      startBtn.disabled = true;
      requestAnimationFrame(loop);
    }catch(e){
      startBtn.textContent = "Start Camera";
      startBtn.disabled = false;
      alert("Camera failed. Use HTTPS or localhost, allow permission.");
      console.error(e);
    }
  }

  function resize(){
    const dpr = Math.max(1, Math.min(2, devicePixelRatio||1));
    c2.width  = Math.floor(c2.clientWidth * dpr);
    c2.height = Math.floor(c2.clientHeight * dpr);
  }
  addEventListener('resize', resize);

  function loop(t){
    if (!stream) return;
    // Cheap throttle for low-end phones
    if (t - lastT < 33) { requestAnimationFrame(loop); return; } // ~30 fps max
    lastT = t;

    if (v1.readyState >= 2){
      if (c2.width === 0) resize();
      x2.drawImage(v1, 0, 0, c2.width, c2.height);

      // Simple green edge filter (fast)
      const img = x2.getImageData(0,0,c2.width,c2.height);
      const d = img.data;
      for (let i=0; i<d.length; i+=4){
        const r=d[i], g=d[i+1], b=d[i+2];
        const y = (r*0.2126 + g*0.7152 + b*0.0722)|0;
        // pseudo edge by thresholding luminance
        const v = y > 110 ? 255 : 0;
        d[i]=0; d[i+1]=v; d[i+2]=0; d[i+3]=255;
      }
      x2.putImageData(img,0,0);
    }
    requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', startCamera);
  flipBtn.addEventListener('click', async () => {
    facing = (facing === 'environment') ? 'user' : 'environment';
    startBtn.disabled = false;
    startBtn.textContent = "Start Camera";
    await startCamera();
  });

  resSel.addEventListener('change', async () => {
    if (!stream) return;
    startBtn.disabled = false;
    startBtn.textContent = "Start Camera";
    await startCamera();
  });

})();
</script>
</body>
</html>
